      --yellow: #f8ff76;
      --dark: #001a64;

      --lightblue: #d8ddf9;
      --white: #ffffff;
      --r: 14px;
      --rl: 20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--dark);
      color: var(--white);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─── */
    .hdr {
      position: sticky; top: 0; z-index: 200;
      background: rgba(0,26,100,.94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,.06);
      height: 58px;
      padding: 0 48px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .hdr-logo { font-size: 17px; font-weight: 800; letter-spacing: -.4px; }
    .hdr-logo em { color: var(--yellow); font-style: normal; }
    .hdr-badge {
      font-size: 10px; font-weight: 700; letter-spacing: 1.6px;
      text-transform: uppercase; color: rgba(255,255,255,.28);
    }

    /* ─── TABS ─── */
    .tab-nav {
      background: rgba(0,20,85,.6);
      border-bottom: 1px solid rgba(255,255,255,.07);
      padding: 0 48px;
      display: flex; overflow-x: auto; scrollbar-width: none;
    }
    .tab-nav::-webkit-scrollbar { display: none; }

    .tab-btn {
      display: flex; align-items: center; gap: 9px;
      background: none; border: none;
      border-bottom: 2px solid transparent;
      color: rgba(255,255,255,.38);
      font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
      padding: 15px 20px; cursor: pointer; white-space: nowrap;
      transition: color .2s, border-color .2s;
    }
    .tab-btn:hover { color: rgba(255,255,255,.72); }
    .tab-btn.active { color: var(--yellow); border-bottom-color: var(--yellow); }

    .tab-prog {
      font-size: 10px; font-weight: 700; letter-spacing: 0;
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.4);
      padding: 2px 8px; border-radius: 20px;
      transition: background .2s, color .2s;
    }
    .tab-btn.active .tab-prog { background: rgba(248,255,118,.14); color: var(--yellow); }

    /* ─── PANELS ─── */
    .panel { display: none; }
    .panel.active { display: block; }

    .main {
      max-width: 800px; margin: 0 auto;
      padding: 52px 48px 88px;
    }

    /* GREETING */
    .greeting { margin-bottom: 44px; }
    .region-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(60,87,225,.18); border: 1px solid rgba(60,87,225,.38);
      color: rgba(255,255,255,.6); font-size: 10px; font-weight: 700;
      letter-spacing: 1.4px; text-transform: uppercase;
      padding: 5px 12px; border-radius: 20px; margin-bottom: 20px;
    }
    .greeting-h {
      font-size: 42px; font-weight: 800; letter-spacing: -1.5px;
      line-height: 1.05; margin-bottom: 14px;
    }
    .greeting-h em { color: var(--yellow); font-style: normal; }
    .greeting-p {
      font-size: 14px; font-weight: 300; color: rgba(255,255,255,.42);
      line-height: 1.75; max-width: 540px;

    .rating-block {
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: var(--rl); padding: 28px 32px; margin-bottom: 44px;

      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,.28); margin-bottom: 22px;
    }

      display: grid; grid-template-columns: repeat(4, 1fr);

    .phase-col { text-align: center; padding: 0 10px; }
    .phase-col + .phase-col { border-left: 1px solid rgba(255,255,255,.06); }
    .phase-lbl {
      font-size: 10px; font-weight: 700; letter-spacing: 1.4px;
      text-transform: uppercase; color: rgba(255,255,255,.3); margin-bottom: 10px;

    .q-card:focus-within {

    .q-num {

    .q-ta {
      display: block; width: 100%; min-height: 84px;

      color: rgba(255,255,255,.48);

    .submit-btn {

      background: #ecf160; transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(248,255,118,.2);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: .45; cursor: default; transform: none; box-shadow: none; }

    .sum-qa:last-child { border-bottom: none; }
    .sum-q {

    .sum-a.empty { color: rgba(255,255,255,.2); font-style: italic; }

    .btn-ghost {
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.65);
      font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
      padding: 13px 30px; border-radius: 100px; cursor: pointer;
      transition: background .2s, color .2s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,.1); color: white; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 680px) {
      .hdr, .tab-nav { padding: 0 20px; }
      .main, #confirm-view { padding: 36px 20px 64px; }
      .greeting-h { font-size: 30px; }
      .phases-grid { grid-template-columns: repeat(2, 1fr); row-gap: 20px; }
      .phase-col + .phase-col { border-left: none; }
      .phase-col:nth-child(3), .phase-col:nth-child(4) { border-top: 1px solid rgba(255,255,255,.06); padding-top: 16px; }
    }
  </style>
</head>

function renderTabs() {

      ${r.label}
      <span class="tab-prog" id="prog-${key}">0/9</span>
    </button>
  `).join('');
}

function renderQuestion(rk, idx, q) {
  const id = `${rk}-q${idx + 1}`;

        <div class="q-num">${idx + 1}</div>
        <div class="q-text">${q.q}</div>
      </div>

      <div class="chips">${chips}</div>
    </div>
  `;
}

function renderStars(rk, phaseIdx) {
  return PHASES.slice(0, 5).map((_, i) => i + 1).map(v => `
    <button class="star-btn" id="star-${rk}-${phaseIdx}-${v}"
      onclick="setRating('${rk}',${phaseIdx},${v})">★</button>
  `).join('');
}

function renderPanel(key, r) {
  const phases = PHASES.map((p, pi) => `
    <div class="phase-col">
      <div class="phase-lbl">${p}</div>
      <div class="stars">${renderStars(key, pi)}</div>
    </div>
  `).join('');

  const questions = r.questions.map((q, i) => renderQuestion(key, i, q)).join('');

  return `
    <div class="panel${key === 'ch' ? ' active' : ''}" id="panel-${key}">
      <div class="main">
        <div class="greeting">
          <div class="region-pill">${r.label}</div>
          <h1 class="greeting-h">${r.greeting}</h1>
          <p class="greeting-p">${r.intro}</p>
        </div>

        <div class="rating-block">
          <div class="block-lbl">Phase-Rating — Wie stark ist eure Region in jeder Phase? (1–5 Sterne)</div>
          <div class="phases-grid">${phases}</div>
        </div>

        <div class="qs-list">${questions}</div>

        <div class="submit-area">
          <p class="submit-hint">Alle Antworten werden sicher an p.fernandes@beyonity.com übermittelt.</p>
          <button class="submit-btn" id="submit-${key}" onclick="submitInterview('${key}')">
            Interview absenden →
          </button>
        </div>
      </div>
    </div>
  `;
}

function init() {
  renderTabs();
  const wrap = document.getElementById('panels-wrap');
  wrap.innerHTML = Object.entries(REGIONS).map(([k, r]) => renderPanel(k, r)).join('');
}

// ─────────────────────────────────────────────
//  INTERACTIONS
// ─────────────────────────────────────────────
function activateTab(key) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${key}`).classList.add('active');
  document.getElementById(`panel-${key}`).classList.add('active');
  state.current = key;
}

function setRating(rk, phaseIdx, value) {
  state.ratings[rk][phaseIdx] = value;
  for (let v = 1; v <= 5; v++) {
    const btn = document.getElementById(`star-${rk}-${phaseIdx}-${v}`);
    if (btn) btn.classList.toggle('on', v <= value);
  }
}

function appendChip(taId, text) {
  const ta = document.getElementById(taId);
  if (!ta) return;
  const cur = ta.value.trim();
  ta.value = cur ? cur + '\n· ' + text : '· ' + text;
  ta.focus();
  updateProgress(taId.split('-q')[0]);
}

function updateProgress(rk) {
  const r = REGIONS[rk];
  if (!r) return;
  const filled = r.questions.filter((_, i) => {
    const ta = document.getElementById(`${rk}-q${i + 1}`);
    return ta && ta.value.trim().length > 0;
  }).length;
  const el = document.getElementById(`prog-${rk}`);
  if (el) el.textContent = `${filled}/9`;
}

// ─────────────────────────────────────────────
//  SUBMISSION
// ─────────────────────────────────────────────
async function submitInterview(rk) {
  const r = REGIONS[rk];
  const btn = document.getElementById(`submit-${rk}`);
  btn.disabled = true;
  btn.textContent = 'Wird gesendet…';

  // Collect answers
  const answers = r.questions.map((q, i) => ({
    question: q.q,
    answer: (document.getElementById(`${rk}-q${i + 1}`)?.value.trim()) || ''
  }));

  // Build rating string
  const ratingStr = PHASES.map((p, i) => {
    const v = state.ratings[rk][i];
    return `${p}: ${'★'.repeat(v)}${'☆'.repeat(5 - v)} (${v}/5)`;
  }).join('  |  ');

  // Build flat payload for Formspree
  const payload = {
    _subject: `Beyonity Regional Interview — ${r.name} (${r.who})`,
    region: r.name,
    interviewee: r.who,
    phase_ratings: ratingStr
  };
  answers.forEach((a, i) => {
    payload[`Q${i + 1}: ${a.question.substring(0, 60)}…`] = a.answer || '(keine Antwort)';
  });

  try {
    const res = await fetch(FORMSPREE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      showConfirmation(rk, answers, ratingStr);
    } else {
      const data = await res.json().catch(() => ({}));
      alert(`Fehler beim Senden: ${data.error || res.status}. Bitte erneut versuchen.`);
      btn.disabled = false;
      btn.textContent = 'Interview absenden →';
    }
  } catch (e) {
    alert('Netzwerkfehler. Bitte Internetverbindung prüfen und erneut versuchen.');
    btn.disabled = false;
    btn.textContent = 'Interview absenden →';
  }
}

// ─────────────────────────────────────────────
//  CONFIRMATION
// ─────────────────────────────────────────────
function showConfirmation(rk, answers, ratingStr) {
  const r = REGIONS[rk];

  document.getElementById('interview-view').style.display = 'none';
  document.getElementById('tab-nav').style.display = 'none';

  const qaRows = answers.map((a, i) => `
    <div class="sum-qa">
      <div class="sum-q">Frage ${i + 1}</div>
      <div class="sum-q" style="font-size:12px;letter-spacing:.2px;text-transform:none;font-weight:400;color:rgba(255,255,255,.55);margin-bottom:6px;">${a.question}</div>
      <div class="sum-a${!a.answer ? ' empty' : ''}">${a.answer ? a.answer.replace(/\n/g, '<br>') : 'Keine Antwort'}</div>
    </div>
  `).join('');

  document.getElementById('confirm-view').innerHTML = `
    <div class="confirm-top">
      <span class="confirm-icon">✅</span>
      <h2 class="confirm-h">Interview abgesendet — <em>Danke, ${r.who}!</em></h2>
      <p class="confirm-p">Die Antworten wurden erfolgreich an p.fernandes@beyonity.com übermittelt.</p>
    </div>

    <div class="sum-block">
      <div class="sum-hdr">
        <span>${r.label} · ${r.who}</span>
        <span class="sum-ratings">${ratingStr}</span>
      </div>
      ${qaRows}
    </div>

    <div class="confirm-actions">
      <button class="btn-ghost" onclick="resetAll()">← Neues Interview starten</button>
    </div>
  `;

  document.getElementById('confirm-view').classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetAll() {
  document.getElementById('confirm-view').classList.remove('show');
  document.getElementById('confirm-view').innerHTML = '';
  document.getElementById('interview-view').style.display = '';
  document.getElementById('tab-nav').style.display = '';
  // Reset form fields
  document.querySelectorAll('.q-ta').forEach(ta => ta.value = '');
  // Reset ratings
  Object.keys(state.ratings).forEach(rk => {
    state.ratings[rk] = [0, 0, 0, 0];
    for (let pi = 0; pi < 4; pi++) {
      for (let v = 1; v <= 5; v++) {
        const btn = document.getElementById(`star-${rk}-${pi}-${v}`);
        if (btn) btn.classList.remove('on');
      }
    }
    updateProgress(rk);
    const sb = document.getElementById(`submit-${rk}`);
    if (sb) { sb.disabled = false; sb.textContent = 'Interview absenden →'; }
  });
  activateTab('ch');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
